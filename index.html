<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gail's Game Room ♥</title>
<link rel="icon" type="image/png" href="build/icon.png">
<link rel="apple-touch-icon" href="build/icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f7f0e2">
<link rel="stylesheet" href="shared.css">
<style>
  /* only what is unique to THIS page lives here */
  body{ overflow:hidden; height:100vh; }
  #room{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:20px; text-align:center; }
  .cards{
    display:grid; grid-template-columns:repeat(2, minmax(150px, 260px)); gap:16px;
    width:min(92vw, 560px);
  }
  .gamecard{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:linear-gradient(180deg,#fffdf6,#f8eed8);
    border:3px solid var(--ink); border-radius:18px; padding:14px 10px 12px;
    box-shadow:3px 4px 0 rgba(92,74,61,.22); cursor:pointer;
    color:var(--ink); text-decoration:none; transition:transform .13s, box-shadow .13s;
  }
  .gamecard:hover{ transform:translateY(-4px) rotate(-.5deg); box-shadow:4px 8px 0 rgba(92,74,61,.2); }
  .gamecard .nm{ font-size:21px; }
  .gamecard .tag2{ font-size:13.5px; color:var(--ink-soft); line-height:1.2; }
  .bunting{ position:fixed; top:0; left:50%; transform:translateX(-50%); pointer-events:none; }
</style>
</head>
<body>

<div id="room"></div>

<script src="shared.js"></script>
<script>
const HER = 'GAIL';

/* pastel bunting across the top */
function bunting(){
  const A = {x:15, y:24}, C = {x:450, y:100}, B = {x:885, y:24};
  let flags = '';
  for(let i = 0; i < 7; i++){
    const t = 0.10 + i * 0.135;
    const x = (1-t)**2*A.x + 2*(1-t)*t*C.x + t*t*B.x;
    const y = (1-t)**2*A.y + 2*(1-t)*t*C.y + t*t*B.y;
    flags += `<polygon points="${x-15},${y} ${x+15},${y} ${x},${y+32}" fill="${PALETTE[i % PALETTE.length]}" opacity=".92"/>`;
  }
  return `<svg class="bunting" width="900" height="150" viewBox="0 0 900 150">
    <path d="M ${A.x} ${A.y} Q ${C.x} ${C.y} ${B.x} ${B.y}" stroke="var(--ink-soft)" stroke-width="2.5" fill="none"/>
    ${flags}</svg>`;
}

/* little icons for the four game cards (inline SVG, like everything here) */
const icoTidier = `
  <svg width="72" height="64" viewBox="0 0 72 64">
    <g transform="rotate(-9 36 32)">
      <rect x="14" y="6" width="44" height="52" rx="6" fill="#b08a5f"/>
      <rect x="20" y="12" width="32" height="40" rx="3" fill="#fffdf6"/>
      ${heartPath(36, 33, 20, '#e8a9b0')}
    </g>
  </svg>`;
const icoSudoku = `
  <svg width="72" height="64" viewBox="0 0 72 64">
    <rect x="9" y="5" width="54" height="54" rx="6" fill="#fffdf6" stroke="#5c4a3d" stroke-width="2.5"/>
    <path d="M27 5 V59 M45 5 V59 M9 23 H63 M9 41 H63" stroke="#5c4a3d" stroke-width="1.6"/>
    <text x="18" y="19" font-size="13" fill="#5c4a3d" text-anchor="middle" font-family="inherit">5</text>
    <text x="54" y="37" font-size="13" fill="#a08c7a" text-anchor="middle" font-family="inherit">3</text>
    <text x="36" y="55" font-size="13" fill="#5c4a3d" text-anchor="middle" font-family="inherit">7</text>
  </svg>`;
const icoWordle = `
  <svg width="86" height="64" viewBox="0 0 86 64">
    ${['#adcaa2','#ecd28a','#e0d5c2','#adcaa2'].map((c, i) =>
      `<rect x="${3 + i*20}" y="22" width="17" height="17" rx="4" fill="${c}" stroke="rgba(92,74,61,.4)" stroke-width="1.5"/>
       <text x="${11.5 + i*20}" y="35.5" font-size="12" fill="#5c4a3d" text-anchor="middle" font-family="inherit">${'GAIL'[i]}</text>`).join('')}
  </svg>`;
const icoSalad = `
  <svg width="72" height="64" viewBox="0 0 72 64">
    <rect x="6" y="2" width="60" height="60" rx="8" fill="#fffdf6" stroke="rgba(92,74,61,.35)" stroke-width="2"/>
    <rect x="10" y="24" width="52" height="16" rx="8" fill="#e8a9b0" opacity=".55"/>
    ${['P A W','W A G','P A W'].map((row, r) => row.split(' ').map((ch, c) =>
      `<text x="${21 + c*15}" y="${19 + r*15.5}" font-size="12" fill="#5c4a3d" text-anchor="middle" font-family="inherit">${'PWL AAO WGV'.split(' ')[r][c]}</text>`).join('')).join('')}
  </svg>`;

const GAMES = [
  { href:'tidier.html', ico:icoTidier, nm:'A Little Tidier', tag:'drag things until they feel just right' },
  { href:'sudoku.html', ico:icoSudoku, nm:'Sudoku',          tag:'numbers, but make them cozy' },
  { href:'wordle.html', ico:icoWordle, nm:'Wordle',          tag:'guess the five-letter word' },
  { href:'salad.html',  ico:icoSalad,  nm:'Word Salad',      tag:'find the words hiding in the grid' },
];

const room = document.getElementById('room');

function addTwinkles(n){
  for(let i = 0; i < n; i++){
    const t = document.createElement('span');
    t.className = 'twinkle';
    t.textContent = ['✦','✧','⋆'][i % 3];
    t.style.left = 5 + Math.random() * 90 + 'vw';
    t.style.top  = 12 + Math.random() * 70 + 'vh';
    t.style.fontSize = 13 + Math.random() * 14 + 'px';
    t.style.animationDelay = (Math.random() * 2.6) + 's';
    room.appendChild(t);
  }
}

function showHome(){
  room.innerHTML = bunting() + `
    <div class="bigtitle" style="font-size:52px;">Gail's Game Room</div>
    <div class="sub">four cozy games, one happy pup pile ♥</div>
    <button class="btn" id="enterBtn">come on in ✨</button>
    <div class="tiny">made with love (and three huskies)</div>`;
  addTwinkles(8);
  document.getElementById('enterBtn').onclick = showGames;
}

function showGames(){
  room.innerHTML = bunting() + `
    <div class="bigtitle">pick a game ♥</div>
    <div class="cards">${GAMES.map(g => `
      <a class="gamecard" href="${g.href}">
        ${g.ico}
        <span class="nm">${g.nm}</span>
        <span class="tag2">${g.tag}</span>
      </a>`).join('')}
    </div>
    <button class="btn" id="backBtn" style="font-size:17px; padding:6px 22px;">← back</button>`;
  addTwinkles(6);
  document.getElementById('backBtn').onclick = showHome;
}

buildPack();
showHome();
</script>
</body>
</html>
