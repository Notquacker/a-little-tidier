<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A Little Tidier ♥</title>
<style>
  :root{
    --paper:#f7f0e2;
    --ink:#5c4a3d;
    --ink-soft:#a08c7a;
    --pink:#e8a9b0;
    --blue:#a9c3e8;
    --green:#adcaa2;
    --yellow:#ecd28a;
    --lilac:#cbb3e0;
    --peach:#f0c4a0;
    --card:#fffdf6;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; }
  body{
    /* warm wall + baseboard + wooden floor */
    background:linear-gradient(180deg,
      #faf4e6 0%, #f7eeda 52%, #f2e6cc 74%,
      #f9f1e0 74%, #f9f1e0 77%,
      #dfbd92 77%, #cda67a 100%);
    color:var(--ink);
    font-family:'Segoe Print','Comic Sans MS',cursive;
    user-select:none;
  }
  /* subtle paper speckle */
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none; opacity:.55;
    background-image:radial-gradient(#dcd0b8 1.2px, transparent 1.8px),
                     radial-gradient(#e5dac4 1.2px, transparent 1.8px);
    background-size:170px 170px, 240px 240px;
    background-position:0 0, 90px 70px;
  }
  /* soft vignette so the middle of the room glows */
  body::after{
    content:''; position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 40%, transparent 58%, rgba(92,74,61,.13) 100%);
  }

  /* ---------- HUD ---------- */
  #hud{ position:fixed; top:10px; left:0; right:0; text-align:center; z-index:5; }
  #hud.hidden{ display:none; }
  #lvlTitle{ font-size:20px; letter-spacing:.5px; }
  #dots span{
    display:inline-block; font-size:15px; line-height:1; color:#ddcdb4;
    margin:2px 3px 0; vertical-align:middle; transition:color .3s, transform .3s;
  }
  #dots span.done{ color:var(--green); }
  #dots span.cur { color:var(--pink); transform:scale(1.3); }

  #hintBtn{
    position:fixed; top:12px; right:14px; z-index:6;
    width:44px; height:44px; border-radius:50%;
    border:2.5px solid var(--ink); background:var(--card); color:var(--ink);
    font-family:inherit; font-size:22px; cursor:pointer;
    box-shadow:2px 3px 0 rgba(92,74,61,.25);
  }
  #hintBtn:active{ transform:translateY(2px); box-shadow:none; }
  #hintBtn.hidden{ display:none; }

  /* ---------- stage ---------- */
  #stageWrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #stage{ position:relative; width:900px; height:560px; touch-action:none; transform-origin:center center; }

  .hint{ opacity:0; transition:opacity .35s; pointer-events:none; }
  #stage.showHints .hint{ opacity:.55; }

  .ghost{ position:absolute; border:3px dashed var(--ink-soft); border-radius:8px; }
  .shadowpiece{ position:absolute; opacity:.3; filter:grayscale(1); pointer-events:none; }
  .hintline{ position:absolute; border-top:3px dashed var(--ink-soft); height:0; }
  .hinttext{ position:absolute; font-size:18px; color:var(--ink-soft); text-align:center; }

  .shelf{
    position:absolute; height:11px; border-radius:5px;
    background:linear-gradient(180deg, #d3aa7c, #a9825f 55%, #8f6a47);
    box-shadow:0 6px 9px rgba(92,74,61,.22), inset 0 2px 0 rgba(255,255,255,.4);
  }

  /* draggable things */
  .frame,.item{ position:absolute; cursor:grab; }
  .frame:active,.item:active{ cursor:grabbing; }
  .frame.locked{ cursor:default; }
  .item{ transition:left .18s ease, top .18s ease; }
  .item.drag{ transition:none; z-index:10; }
  .frame svg, .item svg{ filter:drop-shadow(2.5px 5px 4px rgba(92,74,61,.26)); }
  .item.drag svg{ filter:drop-shadow(5px 13px 10px rgba(92,74,61,.33)); }
  .shadowpiece svg{ filter:none; }
  #pack svg{ filter:drop-shadow(2px 4px 3px rgba(92,74,61,.22)); }
  .steam{ animation:steam 2.6s ease-in-out infinite; }
  .steam.s2{ animation-delay:1.3s; }
  @keyframes steam{ 0%,100%{ opacity:.12; transform:translateY(2px); } 50%{ opacity:.6; transform:translateY(-3px); } }
  .twinkle{ position:absolute; color:var(--yellow); pointer-events:none; animation:tw 2.6s ease-in-out infinite; }
  @keyframes tw{ 0%,100%{ opacity:.15; transform:scale(.8) rotate(-8deg); } 50%{ opacity:.95; transform:scale(1.2) rotate(8deg); } }

  /* ---------- banner ---------- */
  #banner{
    position:fixed; top:44%; left:50%; z-index:20;
    transform:translate(-50%,-50%) scale(0);
    background:linear-gradient(180deg,#fffdf6,#faf0da); border:3px solid var(--ink); border-radius:999px;
    padding:12px 36px; font-size:30px;
    box-shadow:3px 5px 0 rgba(92,74,61,.2);
    transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
  }
  #banner.show{ transform:translate(-50%,-50%) scale(1) rotate(-2deg); }

  /* ---------- sparkles & hearts ---------- */
  .spark{
    position:fixed; z-index:30; pointer-events:none; font-size:20px;
    animation:pop .8s ease-out forwards;
  }
  @keyframes pop{
    from{ transform:translate(0,0) scale(.4); opacity:1; }
    to  { transform:translate(var(--dx),var(--dy)) scale(1.25); opacity:0; }
  }
  .fallheart{
    position:fixed; top:-40px; z-index:2; pointer-events:none;
    color:var(--pink); animation:fall linear forwards;
  }
  @keyframes fall{
    to{ transform:translateY(115vh) rotate(50deg); opacity:.15; }
  }

  /* ---------- screens (title / ending) ---------- */
  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; text-align:center;
  }
  .bigtitle{ font-size:52px; line-height:1.1; text-shadow:2.5px 3.5px 0 rgba(226,190,148,.55); }
  .bigtitle small{ font-size:24px; color:var(--ink-soft); }
  .sub{ font-size:22px; color:var(--ink-soft); }
  .tiny{ font-size:16px; color:var(--ink-soft); }
  .btn{
    font-family:inherit; font-size:24px; color:var(--ink);
    background:linear-gradient(180deg,#fffdf6,#f8eed8); border:3px solid var(--ink); border-radius:999px;
    padding:10px 34px; cursor:pointer; transition:transform .15s, box-shadow .15s;
    box-shadow:3px 4px 0 rgba(92,74,61,.25);
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:4px 7px 0 rgba(92,74,61,.22); }
  .btn:active{ transform:translateY(3px); box-shadow:none; }
  .bigheart{ font-size:90px; color:var(--pink); animation:beat 1.6s ease-in-out infinite; }
  @keyframes beat{ 0%,100%{transform:scale(1)} 12%{transform:scale(1.12)} 24%{transform:scale(1)} }

  /* ---------- the pack (Archy, Ice & Chip) ---------- */
  #pack{ position:fixed; right:14px; bottom:0; z-index:4; display:flex; align-items:flex-end; gap:2px; }
  .dog{ cursor:pointer; text-align:center; }
  .dog:active{ transform:translateY(2px); }
  .dog .tag{
    display:inline-block; font-size:13px; color:var(--ink); line-height:1.3;
    background:rgba(255,253,246,.88); border-radius:8px; padding:0 8px;
    margin-top:-6px; margin-bottom:4px; box-shadow:1px 2px 0 rgba(92,74,61,.15);
  }
  .tail{ transform-box:view-box; transform-origin:94px 106px; animation:wag 3s ease-in-out infinite; }
  .eye{ transform-box:fill-box; transform-origin:center; animation:blink 5s infinite; }
  @keyframes wag{ 0%,100%{transform:rotate(0)} 50%{transform:rotate(14deg)} }
  @keyframes blink{ 0%,91%,100%{transform:scaleY(1)} 95%{transform:scaleY(.08)} }
</style>
</head>
<body>

<div id="hud" class="hidden">
  <div id="lvlTitle"></div>
  <div id="dots"></div>
</div>
<button id="hintBtn" class="hidden" title="hint">?</button>

<div id="stageWrap"><div id="stage"></div></div>
<div id="banner">Just right ♥</div>

<div id="pack"></div>

<script>
/* =====================================================================
   ✏️✏️✏️  EDIT ME  ✏️✏️✏️
   ===================================================================== */
const CONFIG = {
  herName:    "GAIL",                                   // ← her name (used in the letters level + screens)
  dedication: "Every little thing is better with you.", // ← message on the ending screen
  pack:       ["Archy", "Ice", "Chip"],                 // ← the babies ♥ (shown bottom-right + on the ending)
  packFur:    ["#6b7683", "#c3cfd9", "#b98a62"],        //   their fur colours: grey, snow, copper
};

const BANNERS  = ["Just right ♥", "Perfect!", "So tidy!", "Lovely ✨", "Beautiful!", "Spot on!", "Neat & sweet!", "Good human ♥"];
const PALETTE  = ["#e8a9b0", "#f0c4a0", "#ecd28a", "#adcaa2", "#a9c3e8", "#cbb3e0"];

/* =====================================================================
   Basics
   ===================================================================== */
const stage   = document.getElementById('stage');
const hud     = document.getElementById('hud');
const lvlT    = document.getElementById('lvlTitle');
const dotsEl  = document.getElementById('dots');
const hintBtn = document.getElementById('hintBtn');
const banner  = document.getElementById('banner');

const state = { busy:false, level:0 };
let SCALE = 1;

function fit(){
  SCALE = Math.min((innerWidth - 20) / 900, (innerHeight - 110) / 560, 1.15);
  stage.style.transform = `scale(${SCALE})`;
}
addEventListener('resize', fit); fit();

const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* unique ids for SVG gradients (ids are global in the document) */
let __uid = 0;
const uid = p => p + (++__uid);

/* darken (f<1) or lighten (f>1) a #rrggbb colour */
function shade(hex, f){
  const n = parseInt(hex.slice(1), 16);
  const ch = s => clamp(Math.round(((n >> s) & 255) * f), 0, 255);
  return `rgb(${ch(16)},${ch(8)},${ch(0)})`;
}

/* =====================================================================
   Sound (WebAudio — no files needed)
   ===================================================================== */
let AC = null;
document.addEventListener('pointerdown', () => {
  if(!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if(AC.state === 'suspended') AC.resume();
}, { capture:true });

function tone(freq, delay = 0, dur = .15, type = 'sine', vol = .12, slideTo = null){
  if(!AC) return;
  const t = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(.001, t + dur);
  o.connect(g).connect(AC.destination);
  o.start(t); o.stop(t + dur + .05);
}
const ding    = () => { tone(880, 0, .12); tone(1318, .07, .18); };
const fanfare = () => [523, 659, 784, 1047].forEach((f, i) => tone(f, i * .09, .28, 'triangle'));
const awoo    = () => {                       // a husky howl: a-wooooo-oo
  tone(240, 0,   .10, 'triangle', .07, 420);
  tone(420, .08, .55, 'sine',     .09, 720);
  tone(720, .62, .50, 'sine',     .07, 330);
};

/* =====================================================================
   Sparkles
   ===================================================================== */
const SPARK_CHARS = ['✦','✧','✨','♥','⋆'];
function sparkAt(sx, sy, n = 14){           // sx/sy in stage coordinates
  const r = stage.getBoundingClientRect();
  sparkRaw(r.left + sx * (r.width / 900), r.top + sy * (r.height / 560), n);
}
function sparkRaw(cx, cy, n = 14){          // cx/cy in screen coordinates
  for(let i = 0; i < n; i++){
    const s = document.createElement('span');
    s.className = 'spark';
    s.textContent = SPARK_CHARS[Math.floor(Math.random() * SPARK_CHARS.length)];
    s.style.color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
    const a = Math.random() * Math.PI * 2, d = 40 + Math.random() * 70;
    s.style.setProperty('--dx', Math.cos(a) * d + 'px');
    s.style.setProperty('--dy', Math.sin(a) * d + 'px');
    s.style.left = cx + 'px'; s.style.top = cy + 'px';
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }
}

/* =====================================================================
   Drag helper (pointer events, works for mouse + touch)
   ===================================================================== */
function draggable(el, h){
  el.addEventListener('pointerdown', e => {
    if(state.busy || el.classList.contains('locked')) return;
    e.preventDefault();
    try{ el.setPointerCapture(e.pointerId); }catch(_){ /* some inputs don't support capture */ }
    const sx = e.clientX, sy = e.clientY;
    h.start && h.start(e);
    const move = ev => h.move((ev.clientX - sx) / SCALE, (ev.clientY - sy) / SCALE, ev);
    const up = () => {
      el.removeEventListener('pointermove', move);
      el.removeEventListener('pointerup', up);
      el.removeEventListener('pointercancel', up);
      h.end && h.end();
    };
    el.addEventListener('pointermove', move);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
  });
}

/* =====================================================================
   SVG art (all hand-rolled — no image files)
   ===================================================================== */
/* a filled heart shape centered on (cx,cy) with size s */
const heartPath = (cx, cy, s, fill) =>
  `<path d="M ${cx} ${cy+0.35*s} C ${cx-0.55*s} ${cy-0.02*s} ${cx-0.32*s} ${cy-0.45*s} ${cx} ${cy-0.16*s}
            C ${cx+0.32*s} ${cy-0.45*s} ${cx+0.55*s} ${cy-0.02*s} ${cx} ${cy+0.35*s} Z" fill="${fill}"/>`;

/* a little pink paw print centered on (cx,cy) */
const pawAt = (cx, cy, r) => {
  let toes = '';
  for(let i = 0; i < 4; i++){
    const a = -0.65 + i * 0.433;
    toes += `<circle cx="${cx + Math.sin(a)*r*2.5}" cy="${cy - r*1.35 - Math.cos(a)*r*1.1}" r="${r*0.48}" fill="#eba3ad"/>`;
  }
  return toes + `<ellipse cx="${cx}" cy="${cy}" rx="${r*1.35}" ry="${r*1.05}" fill="#df8f9b"/>
    <ellipse cx="${cx - r*0.35}" cy="${cy - r*0.3}" rx="${r*0.35}" ry="${r*0.25}" fill="#f2bcc3" opacity=".8"/>`;
};

const artHeart = (w, h) => {
  const g = uid('hg'), s = Math.min(w, h) * 0.52;
  return `<defs><linearGradient id="${g}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4c1c8"/><stop offset="1" stop-color="#db8894"/></linearGradient></defs>
    ${heartPath(w/2, h/2, s, `url(#${g})`)}
    <ellipse cx="${w/2 - s*0.18}" cy="${h/2 - s*0.16}" rx="${s*0.10}" ry="${s*0.16}" fill="#fff" opacity=".45"
             transform="rotate(-20 ${w/2 - s*0.18} ${h/2 - s*0.16})"/>
    ${heartPath(w/2 - s*0.52, h/2 + s*0.30, s*0.22, 'var(--pink)')}
    ${heartPath(w/2 + s*0.55, h/2 - s*0.42, s*0.18, 'var(--pink)')}`;
};

const artFlower = (w, h) => {
  const g = uid('fl'), cx = w/2, cy = h/2 - h*0.08, r = Math.min(w, h)*0.13;
  let petals = '';
  for(let i = 0; i < 6; i++){
    const a = i/6*Math.PI*2 - Math.PI/2, px = cx + Math.cos(a)*r*1.6, py = cy + Math.sin(a)*r*1.6;
    petals += `<ellipse cx="${px}" cy="${py}" rx="${r*0.78}" ry="${r*1.02}" fill="url(#${g})"
               transform="rotate(${a*180/Math.PI + 90} ${px} ${py})"/>`;
  }
  return `<defs><linearGradient id="${g}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcc8ee"/><stop offset="1" stop-color="#b295d2"/></linearGradient></defs>
    <path d="M ${cx} ${cy+r*1.5} C ${cx-r*0.6} ${cy+r*2.8} ${cx+r*0.6} ${cy+r*3.2} ${cx} ${h-17}"
          stroke="#8fae85" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="${cx - r*0.95}" cy="${h - 17 - r*1.1}" rx="${r*0.85}" ry="${r*0.4}" fill="#a9c69e"
             transform="rotate(-30 ${cx - r*0.95} ${h - 17 - r*1.1})"/>
    ${petals}
    <circle cx="${cx}" cy="${cy}" r="${r*0.9}" fill="#f3d98b"/>
    <circle cx="${cx - r*0.25}" cy="${cy - r*0.28}" r="${r*0.28}" fill="#fbeebc"/>`;
};

const artRainbow = (w, h) => {
  const cx = w/2, cy = h*0.62, R = Math.min(w, h)*0.30;
  const arcs = [['#e89aa4',0],['#f0c489',7],['#f3dd9a',14],['#a9c3e8',21]].map(([c, off]) => {
    const r = R - off;
    return `<path d="M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}" stroke="${c}" stroke-width="7" fill="none" stroke-linecap="round"/>`;
  }).join('');
  const cloud = (x, y, s) => `<g fill="#fff" stroke="#e8dfc9" stroke-width="1.5">
    <circle cx="${x}" cy="${y}" r="${s}"/><circle cx="${x-s}" cy="${y+s*0.3}" r="${s*0.7}"/>
    <circle cx="${x+s}" cy="${y+s*0.3}" r="${s*0.7}"/></g>`;
  return arcs + cloud(cx - R, cy, R*0.22) + cloud(cx + R, cy, R*0.22);
};

const frameSVG = (w, h, art) => {
  const wood = uid('wd');
  return `
  <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${wood}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c59a6b"/><stop offset=".5" stop-color="#a9825f"/>
      <stop offset="1" stop-color="#8f6a4a"/></linearGradient></defs>
    <rect x="2" y="2" width="${w-4}" height="${h-4}" rx="9" fill="url(#${wood})"/>
    <rect x="2" y="2" width="${w-4}" height="${h-4}" rx="9" fill="none" stroke="rgba(92,74,61,.45)" stroke-width="1.5"/>
    <rect x="11" y="11" width="${w-22}" height="${h-22}" rx="4" fill="#fffdf6"/>
    <rect x="15" y="15" width="${w-30}" height="${h-30}" rx="3" fill="none" stroke="#e3cfa8" stroke-width="1.5"/>
    ${art(w, h)}
    <rect x="11" y="11" width="${w-22}" height="10" fill="rgba(92,74,61,.06)"/>
  </svg>`;
};

const pencilSVG = (h, color) => {
  const w = 30, tip = 26, eraser = 16, ferrule = 9;
  const bodyTop = tip, bodyH = h - tip - eraser - ferrule;
  return `
  <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <polygon points="${w/2},2 ${w-3},${tip} 3,${tip}" fill="#eed9ae"/>
    <polygon points="${w/2},2 ${w-3},${tip} ${w/2 + 6},${tip}" fill="#dcbf8a"/>
    <path d="M ${w/2 - 4.5} ${tip*0.42} L ${w/2} 3 L ${w/2 + 4.5} ${tip*0.42} Q ${w/2} ${tip*0.58} ${w/2 - 4.5} ${tip*0.42} Z" fill="#5f5148"/>
    <rect x="3" y="${bodyTop}" width="${w-6}" height="${bodyH}" fill="${color}"/>
    <rect x="${3 + (w-6)*0.62}" y="${bodyTop}" width="${(w-6)*0.38}" height="${bodyH}" fill="${shade(color,.86)}"/>
    <rect x="5" y="${bodyTop}" width="4" height="${bodyH}" fill="${shade(color,1.14)}" opacity=".8"/>
    <rect x="3" y="${h - eraser - ferrule}" width="${w-6}" height="${ferrule}" fill="#d9dde1"/>
    <line x1="3" y1="${h - eraser - ferrule + 2.5}" x2="${w-3}" y2="${h - eraser - ferrule + 2.5}" stroke="#b9bfc6" stroke-width="1.4"/>
    <line x1="3" y1="${h - eraser - 2.5}" x2="${w-3}" y2="${h - eraser - 2.5}" stroke="#b9bfc6" stroke-width="1.4"/>
    <rect x="3" y="${h - eraser}" width="${w-6}" height="${eraser - 1.5}" rx="5" fill="#eba3ad"/>
    <rect x="6" y="${h - eraser + 2}" width="6" height="${eraser - 8}" rx="3" fill="#f6c3ca"/>
  </svg>`;
};

const bookSVG = (w, h, color) => {
  const g = uid('bk');
  return `
  <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="${g}" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="${shade(color,1.12)}"/><stop offset=".25" stop-color="${color}"/>
      <stop offset="1" stop-color="${shade(color,.82)}"/></linearGradient></defs>
    <rect x="1.5" y="1.5" width="${w-3}" height="${h-3}" rx="5" fill="url(#${g})" stroke="${shade(color,.6)}" stroke-width="2"/>
    <rect x="4" y="${h*0.10}" width="${w-8}" height="7" rx="2" fill="#f6eed8" opacity=".9"/>
    <rect x="4" y="${h*0.10 + 9}" width="${w-8}" height="2.5" rx="1" fill="#cbb489"/>
    <rect x="4" y="${h*0.82}" width="${w-8}" height="7" rx="2" fill="#f6eed8" opacity=".9"/>
    <rect x="4" y="${h*0.82 - 4.5}" width="${w-8}" height="2.5" rx="1" fill="#cbb489"/>
    <rect x="${w/2 - 10}" y="${h/2 - 16}" width="20" height="32" rx="3" fill="#fffdf6" opacity=".92"/>
    <path d="M ${w/2} ${h/2 - 6} l3.5 6 -3.5 6 -3.5 -6 Z" fill="${shade(color,.75)}"/>
  </svg>`;
};

const artPaw = (w, h) => pawAt(w/2, h/2 + h*0.10, Math.min(w, h)*0.15);

const mugSVG = (color, deco) => {
  const g = uid('mg');
  return `
  <svg width="120" height="112" viewBox="0 0 120 112" xmlns="http://www.w3.org/2000/svg">

function addHintText(txt, x, y, w = 300){
  const t = document.createElement('div');
  t.className = 'hinttext hint';

  t.style.left = (x - w/2) + 'px'; t.style.top = y + 'px'; t.style.width = w + 'px';

}
function addShelf(x1, x2, y){
  const s = document.createElement('div');
  s.className = 'shelf';

/* ---- generic "sort things into the right order" level ---------------- */
function makeSortLevel({ title, buildItems, baseY, slotW, isSolved, buildHints }){
  return {
    title,
    run(onSolved){
      const items = buildItems();
      const n = items.length;
      const slotX = k => 450 + (k - (n - 1) / 2) * slotW;

      let order;
      do { order = shuffle([...items]); } while (isSolved(order));

      buildHints && buildHints();

      function layout(exceptEl){
        order.forEach((it, k) => {
          if(it.el === exceptEl) return;
          it.el.style.left = (slotX(k) - it.w / 2) + 'px';
          it.el.style.top  = (baseY - it.h) + 'px';
        });
      }

      items.forEach(it => {
        const el = document.createElement('div');
        el.className = 'item';
        el.innerHTML = it.svg;
        it.el = el;
        stage.appendChild(el);

        draggable(el, {
          start(){
            el.classList.add('drag');
            it.sl = parseFloat(el.style.left);
            it.st = parseFloat(el.style.top);
          },
          move(dx, dy){
            el.style.left = (it.sl + dx) + 'px';
            el.style.top  = (it.st + dy * 0.25 - 10) + 'px';
            const center = it.sl + it.w / 2 + dx;
            const k = clamp(Math.round((center - slotX(0)) / slotW), 0, n - 1);
            const cur = order.indexOf(it);
            if(k !== cur){
              order.splice(cur, 1);
              order.splice(k, 0, it);
              layout(el);
            }
          },
          end(){
            el.classList.remove('drag');
            layout(null);
            if(isSolved(order)){
              items.forEach(i => i.el.classList.add('locked'));
              setTimeout(onSolved, 250);
            }
          }
        });
      });
      layout(null);
    }
  };
}

/* ---- generic "rotate things until they sit straight" level ----------- */
function makeRotateLevel({ title, defs, hintText, extras }){
  return {
    title,
    run(onSolved){
      extras && extras();
      let locked = 0;
      defs.forEach(d => {
        // dashed ghost (hint)
        const g = document.createElement('div');
        g.className = 'ghost hint';
        g.style.left = (d.cx - d.w/2) + 'px'; g.style.top = (d.cy - d.h/2) + 'px';
        g.style.width = d.w + 'px'; g.style.height = d.h + 'px';
        stage.appendChild(g);

        const el = document.createElement('div');
        el.className = 'frame';
        el.innerHTML = d.svg;
        el.style.left = (d.cx - d.w/2) + 'px';
        el.style.top  = (d.cy - d.h/2) + 'px';
        el.style.transform = `rotate(${d.a}deg)`;
        stage.appendChild(el);

        let raw = d.a;
        draggable(el, {
          start(){ d.sa = raw; },
          move(dx){
            raw = clamp(d.sa + dx * 0.15, -45, 45);
            el.style.transform = `rotate(${Math.abs(raw) < 2.2 ? 0 : raw}deg)`; // magnetic
          },
          end(){
            if(Math.abs(raw) <= 3.2){
              raw = 0;
              el.style.transform = 'rotate(0deg)';
              el.classList.add('locked');
              ding();
              sparkAt(d.cx, d.cy, 8);
              if(++locked === defs.length) setTimeout(onSolved, 300);
            }
          }
        });
      });
      addHintText(hintText, 450, 465, 520);
    }
  };
}

        el.style.top  = (cy - p.h/2) + 'px';
      };
      place();
      stage.appendChild(el);

      draggable(el, {
        start(){ el.classList.add('drag'); p.scx = cx; p.scy = cy; },
        move(dx, dy){
          cx = clamp(p.scx + dx, 20, 880);
          cy = clamp(p.scy + dy, 20, 540);
          place();
        },
        end(){
          el.classList.remove('drag');
          if(Math.abs(cx - p.tx) < 24 && Math.abs(cy - ty) < 24){
            cx = p.tx; cy = ty; place();
            el.classList.add('locked');
            ding();
            sparkAt(cx, cy, 8);
            if(++locked === pieces.length) setTimeout(onSolved, 300);
          }
        }
      });
    });
    addHintText("match the shapes in the drawer", 450, 500, 520);
  }
};

/* =====================================================================
   LEVEL — Love Letters (spell her name)
   ===================================================================== */
const NAME = CONFIG.herName.toUpperCase().replace(/[^A-Z0-9]/g, '') || 'LOVE';
const tileS = Math.min(72, Math.floor(760 / NAME.length) - 12);
const levelLetters = makeSortLevel({
  title: "Love Letters",
  slotW: tileS + 12,
  baseY: 280 + tileS / 2,
  buildItems: () => NAME.split('').map((ch, i) =>
    ({ w:tileS, h:tileS, key:i, letter:ch, svg:tileSVG(tileS, ch, PALETTE[i % PALETTE.length]) })),
  isSolved: order => order.map(it => it.letter).join('') === NAME,
  buildHints(){
    addHintText(NAME.split('').join(' '), 450, 170, 700);
    addHintText("spell it out ♥", 450, 380, 300);
  }
});

/* =====================================================================
   Flow: title → levels → ending
   ===================================================================== */
const LEVELS = [levelStraighten, levelAlign, levelPencils, levelMugs, levelBooks, levelTreats, levelDrawer, levelLetters];
let heartsTimer = null;

function clearStage(){
  stage.innerHTML = '';
  stage.classList.remove('showHints');
  if(heartsTimer){ clearInterval(heartsTimer); heartsTimer = null; }
}

function drawDots(cur){
  dotsEl.innerHTML = LEVELS.map((_, i) =>
    `<span class="${i < cur ? 'done' : i === cur ? 'cur' : ''}">♥</span>`).join('');
}

/* pastel bunting garland for the title / ending screens */
function bunting(){
  const A = {x:15, y:24}, C = {x:450, y:100}, B = {x:885, y:24};
  let flags = '';
  for(let i = 0; i < 7; i++){
    const t = 0.10 + i * 0.135;
    const x = (1-t)**2*A.x + 2*(1-t)*t*C.x + t*t*B.x;
    const y = (1-t)**2*A.y + 2*(1-t)*t*C.y + t*t*B.y;
    flags += `<polygon points="${x-15},${y} ${x+15},${y} ${x},${y+32}" fill="${PALETTE[i % PALETTE.length]}" opacity=".92"/>`;
  }
  return `<svg width="900" height="150" viewBox="0 0 900 150" style="position:absolute;top:0;left:0;pointer-events:none">
    <path d="M ${A.x} ${A.y} Q ${C.x} ${C.y} ${B.x} ${B.y}" stroke="var(--ink-soft)" stroke-width="2.5" fill="none"/>
    ${flags}</svg>`;
}

function addTwinkles(n){
  for(let i = 0; i < n; i++){
    const t = document.createElement('span');
    t.className = 'twinkle';
    t.textContent = ['✦','✧','⋆'][i % 3];
    t.style.left = 40 + Math.random() * 820 + 'px';
    t.style.top  = 90 + Math.random() * 400 + 'px';
    t.style.fontSize = 13 + Math.random() * 14 + 'px';
    t.style.animationDelay = (Math.random() * 2.6) + 's';
    stage.appendChild(t);
  }
}

function startLevel(i){
  clearStage();
  state.level = i; state.busy = false;
  hud.classList.remove('hidden');
  hintBtn.classList.remove('hidden');
  lvlT.textContent = `${i + 1} · ${LEVELS[i].title}`;
  drawDots(i);
  LEVELS[i].run(() => {
    state.busy = true;
    fanfare();
    sparkAt(450, 260, 26);
    banner.textContent = BANNERS[i % BANNERS.length];
    banner.classList.add('show');
    setTimeout(() => {
      banner.classList.remove('show');
      (i + 1 < LEVELS.length) ? startLevel(i + 1) : showEnd();
    }, 1900);
  });
}

function showTitle(){
  clearStage();
  hud.classList.add('hidden');
  hintBtn.classList.add('hidden');
  stage.innerHTML = bunting() + `
    <div class="screen">
      <div class="bigtitle">A Little Tidier <small>(…to the left, a bit)</small></div>
      <div class="sub">a tiny tidying game, made with ♥ for ${CONFIG.herName}</div>
      <button class="btn" id="startBtn">start tidying ✨</button>
      <div class="tiny">drag things around until they feel <i>just right</i></div>
    </div>`;
  addTwinkles(9);
  document.getElementById('startBtn').onclick = () => startLevel(0);
}

function showEnd(){
  clearStage();
  hud.classList.add('hidden');
  hintBtn.classList.add('hidden');
  stage.innerHTML = bunting() + `
    <div class="screen">
      <div class="bigheart">♥</div>
      <div class="bigtitle">All tidy, ${CONFIG.herName}!</div>
      <div class="sub">${CONFIG.dedication}</div>
      <div class="tiny">— love from me, ${CONFIG.pack.slice(0, -1).join(', ')} &amp; ${CONFIG.pack[CONFIG.pack.length - 1]} ♥</div>
      <button class="btn" id="againBtn">tidy again ✨</button>
    </div>`;
  document.getElementById('againBtn').onclick = showTitle;
  heartsTimer = setInterval(() => {
    const s = document.createElement('span');
    s.className = 'fallheart';
    s.textContent = '♥';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.fontSize = 14 + Math.random() * 26 + 'px';
    s.style.animationDuration = 3 + Math.random() * 3 + 's';
    document.body.appendChild(s);
    s.addEventListener('animationend', () => s.remove());
  }, 260);
}

/* hint button: reveal ghosts / guide lines for a moment */
hintBtn.addEventListener('click', () => {
  stage.classList.add('showHints');
  setTimeout(() => stage.classList.remove('showHints'), 2600);
});

/* the pack says hi — click a husky and it howls */
CONFIG.pack.forEach((name, i) => {
  const d = document.createElement('div');
  d.className = 'dog';
  d.title = name;
  const collars = [PALETTE[0], PALETTE[4], PALETTE[3]];   // pink, blue, green
  d.innerHTML = huskySVG(CONFIG.packFur[i % CONFIG.packFur.length], collars[i % collars.length])
              + `<span class="tag">${name}</span>`;
  d.querySelector('.tail').style.animationDelay = (i * -1.1) + 's';   // don't wag in sync
  d.addEventListener('click', e => { awoo(); sparkRaw(e.clientX, e.clientY - 25, 7); });
  document.getElementById('pack').appendChild(d);
});

showTitle();
</script>
</body>
</html>
