<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wordle ♥ Gail's Game Room</title>
<link rel="icon" type="image/png" href="build/icon.png">
<meta name="theme-color" content="#f7f0e2">
<link rel="stylesheet" href="shared.css">
<style>
  body{ display:flex; flex-direction:column; align-items:center; gap:12px; padding:56px 10px 130px; }
  h1{ margin:0; }
  #board{ display:grid; grid-template-rows:repeat(6, 1fr); gap:6px; }
  .brow{ display:grid; grid-template-columns:repeat(5, 1fr); gap:6px; }
  .tile{
    width:min(58px, 15vw); height:min(58px, 15vw);
    border:2.5px solid #cbbda9; border-radius:9px; background:var(--card);
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(20px, 6vw, 30px); transition:transform .12s, background .3s, border-color .3s;
  }
  .tile.fill{ border-color:var(--ink-soft); transform:scale(1.06); }
  .tile.g{ background:var(--green);  border-color:var(--green); }
  .tile.y{ background:var(--yellow); border-color:var(--yellow); }
  .tile.x{ background:#ddd2c0; border-color:#ddd2c0; color:#8a7c6b; }
  .tile.invalid{ background:#f3caca; border-color:#c96a6a; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .tile.shake{ animation:shake .3s ease 2; }
  #kb{ display:flex; flex-direction:column; gap:6px; align-items:center; }
  .krow{ display:flex; gap:5px; }
  .key{
    min-width:30px; padding:11px 8px; border-radius:8px; border:2px solid rgba(92,74,61,.35);
    background:var(--card); font-family:inherit; font-size:15px; color:var(--ink); cursor:pointer;
  }
  .key.wide{ padding:11px 12px; }
  .key.g{ background:var(--green); } .key.y{ background:var(--yellow); }
  .key.x{ background:#ddd2c0; color:#8a7c6b; }
  .key:active{ transform:translateY(2px); }
  #again{ display:none; }
  #pack{ transform:scale(.6); transform-origin:100% 100%; }   /* smaller pups, off the keyboard */
</style>
</head>
<body>

<h1 class="bigtitle" style="font-size:34px;">Wordle</h1>
<div class="tiny">guess the 5-letter word in 6 tries</div>
<div id="board"></div>
<div id="kb"></div>
<button class="btn" id="again">new word ✨</button>

<script src="shared.js"></script>
<script>
/* answers the game can pick — a mix of English and Dutch, edit freely! */
const ANSWERS = ("HUSKY HEART SWEET TREAT PUPPY SMILE DAISY TULIP PEACH BERRY HONEY CANDY " +
  "APPLE MANGO MELON LEMON GRAPE OLIVE TOAST BREAD CREAM SUGAR SPICE JUICE PIZZA SALAD LUNCH FEAST " +
  "HOUSE CHAIR TABLE PLANT BLOOM MAPLE RIVER OCEAN BEACH CORAL SHELL PEARL WHALE ROBIN TIGER PANDA " +
  "MOUSE SHEEP ZEBRA GHOST FAIRY MAGIC ROYAL QUEEN CROWN CHARM LUCKY HAPPY MERRY PEACE QUIET DREAM " +
  "SLEEP NIGHT SUNNY RAINY SNOWY FROST STORM CLOUD LIGHT SHINE FLAME GLOBE WORLD EARTH " +
  "MUSIC PIANO DANCE PARTY STORY PAINT BRUSH CHESS TRAIN COAST FLOAT DRINK WATER FLOUR CHEEK BRAVE " +
  "CLEAN FRESH PLUSH TEDDY JELLY SNACK SPOON " +
  // extra words added for more variety — all real, all kept cozy/positive on purpose
  "ABOUT ABOVE ADULT AFTER AGAIN AGENT AGREE AHEAD ALARM ALBUM ALIVE ALLOW ALONE ALONG ALTER AMONG " +
  "ANGEL ANGLE APPLY ARENA ARGUE ARISE ARMOR ASIDE ASSET AVOID AWAIT AWAKE AWARD AWARE BADGE BASIC " +
  "BASIN BEGIN BEING BELOW BENCH BIRTH BLACK BLADE BLANK BLAST BLOCK BOARD BOAST BONUS BOOST BRAIN " +
  "BRAND BRASS BREAK BREED BRIEF BRING BROAD BROWN BUILD BUILT BUNCH CABLE CARGO CARRY CATCH CAUSE " +
  "CHAIN CHALK CHART CHASE CHECK CHEST CHIEF CHILD CHOSE CIVIL CLAIM CLASS CLEAR CLICK CLIFF CLIMB " +
  "CLOCK CLOSE COACH COVER CRAFT CRAZY CREEK CROSS CROWD CRUSH CURVE CYCLE DAILY DEBUT DECAY DELAY " +
  "DEPTH DERBY DOZEN DRAFT DRAMA DRANK DRESS DRIVE DROVE EARLY EIGHT ELBOW ELDER ELECT EMPTY ENJOY " +
  "ENTER ENTRY EQUAL EVENT EVERY EXACT EXIST EXTRA FAITH FALSE FAVOR FENCE FIBER FIELD FIFTH FIFTY " +
  "FINAL FIRST FIXED FLASH FLEET FLOOR FLUID FOCUS FORCE FORTH FORTY FORUM FOUND FRAME FRANK FRONT " +
  "FRUIT FUNNY GIANT GIVEN GLASS GLORY GRACE GRADE GRAND GRANT GRASS GREAT GREEN GREET GRILL GROUP " +
  "GROWN GUARD GUESS GUEST GUIDE HEAVY HELLO HONOR HORSE HOTEL HUMAN HUMOR IDEAL IMAGE INDEX INNER " +
  "INPUT ISSUE IVORY JOINT JUDGE KNOCK KNOWN LABEL LABOR LARGE LASER LATER LAUGH LAYER LEARN LEAST " +
  "LEAVE LEGAL LEVEL LIMIT LINEN LOCAL LOGIC LOOSE LOWER LOYAL MAJOR MAKER MARCH MATCH MAYOR MEDAL " +
  "MEDIA MERCY MERIT METAL MIGHT MINOR MINUS MODEL MONEY MONTH MORAL MOTOR MOUNT MOUTH MOVIE NERVE " +
  "NEVER NOBLE NOISE NORTH NOTED NOVEL NURSE OFFER OFTEN ORDER OTHER OUTER OWNER PANEL PAPER PATCH " +
  "PHASE PHONE PHOTO PIECE PILOT PITCH PLACE PLAIN PLANE PLATE POINT POUND POWER PRESS PRICE PRIDE " +
  "PRIME PRINT PRIOR PRIZE PROOF PROUD PROVE QUICK QUITE QUOTE RADIO RAISE RANGE RAPID RATIO REACH " +
  "READY REALM REBEL REFER RELAX REPLY RIDER RIDGE RIGHT RIVAL ROBOT ROCKY ROUGH ROUND ROUTE RUGBY " +
  "RURAL SAUCE SCALE SCENE SCOPE SCORE SCOUT SENSE SERVE SEVEN SHALL SHAPE SHARE SHARP SHEET SHELF " +
  "SHIFT SHIRT SHORT SHOWN SIGHT SILLY SINCE SIXTH SIXTY SIZED SKILL SLICE SLIDE SLOPE SMALL SMART " +
  "SMELL SMOKE SNAKE SOLID SOLVE SOUND SOUTH SPACE SPARE SPEAK SPEED SPEND SPENT SPLIT SPOKE SPORT " +
  "SQUAD STAFF STAGE STAIR STAKE STAND START STATE STEAM STEEL STEEP STICK STIFF STILL STOCK STONE " +
  "STORE STOVE STRIP STUCK STUDY STUFF STYLE SUITE SUPER SWIFT SWING TAKEN TASTE TEACH THANK THEME " +
  "THERE THICK THING THINK THIRD THOSE THREE THREW THROW TIGHT TIMER TITLE TODAY TOOTH TOTAL TOUCH " +
  "TOUGH TOWER TRACE TRACK TRADE TREND TRIAL TRIBE TRICK TRIED TRIES TRUCK TRULY TRUNK TRUST TRUTH " +
  "TWICE UNDER UNION UNITY UNTIL UPPER URBAN USAGE USUAL VALID VALUE VIDEO VISIT VITAL VOICE WATCH " +
  "WEIGH WHEAT WHEEL WHERE WHICH WHILE WHITE WHOLE WHOSE WOMAN WORTH WOULD WRITE YIELD YOUNG YOUTH " +
  // Dutch words — the dictionary API below is English-only (checked: it 404s on
  // every Dutch word, even common ones), so these are validated the same way as
  // our own curated English words: instantly, from this list, no network needed.
  "VREDE KATJE VOGEL BLOEM HEMEL ZOMER LENTE AVOND DROOM SLAAP NACHT BROOD APPEL KAARS STOEL TAFEL " +
  "DEKEN KUSJE LIEFS SCHAT TROUW GELUK KLEIN GROOT BLOND BRUIN GRIJS PAARS GROEN BLAUW BOTER TAART " +
  "KRUID VISJE PAARD REGEN AARDE VRAAG FIETS KRANT KLEUR FEEST NIEUW OUDER JUIST BLOEI TROTS ZACHT STERK"
).split(' ');
const KNOWN_WORDS = new Set(ANSWERS);   // instant check — no network needed for our own list

let answer, row, col, done, checking = false;
const board = document.getElementById('board');
const kb    = document.getElementById('kb');
const again = document.getElementById('again');

/* ---------------------------------------------------------------
   THE core of Wordle: score a guess against the answer.
   Two passes, so double letters behave correctly:
   pass 1 — exact matches turn green, and we COUNT what's left
   pass 2 — a letter only turns yellow while that count lasts
   --------------------------------------------------------------- */
function score(guess, ans){
  const res = Array(5).fill('x'), left = {};
  for(let i = 0; i < 5; i++){
    if(guess[i] === ans[i]) res[i] = 'g';
    else left[ans[i]] = (left[ans[i]] || 0) + 1;
  }
  for(let i = 0; i < 5; i++){
    if(res[i] !== 'g' && left[guess[i]] > 0){ res[i] = 'y'; left[guess[i]]--; }
  }
  return res;
}

function newGame(){
  answer = ANSWERS[Math.floor(Math.random() * ANSWERS.length)];
  row = 0; col = 0; done = false; checking = false;
  again.style.display = 'none';
  board.innerHTML = Array.from({length: 6}, () =>
    `<div class="brow">${'<div class="tile"></div>'.repeat(5)}</div>`).join('');
  kb.innerHTML = ['QWERTYUIOP', 'ASDFGHJKL', '⏎ZXCVBNM⌫'].map(r =>
    `<div class="krow">${[...r].map(k =>
      `<button class="key ${k === '⏎' || k === '⌫' ? 'wide' : ''}" data-k="${k}">${k}</button>`).join('')}</div>`).join('');
  kb.querySelectorAll('.key').forEach(k => k.onclick = () => press(k.dataset.k));
}

function restartSameWord(){          // "restart" = retry the same word
  row = 0; col = 0; done = false; checking = false;
  again.style.display = 'none';
  board.innerHTML = Array.from({length: 6}, () =>
    `<div class="brow">${'<div class="tile"></div>'.repeat(5)}</div>`).join('');
  kb.querySelectorAll('.key').forEach(k => k.classList.remove('g', 'y', 'x'));
}

const tile = (r, c) => board.children[r].children[c];

/* ---------------------------------------------------------------
   Is this actually a word? Our own list answers instantly (and
   guarantees the secret word itself always validates, even if the
   dictionary API hiccups). Anything else gets looked up for real
   via the Free Dictionary API. If there's no internet, we can't
   check unfamiliar words, so we quietly let them through rather
   than block play entirely — offline you're on the honour system.
   --------------------------------------------------------------- */
async function isRealWord(word){
  if(KNOWN_WORDS.has(word)) return true;
  try{
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word.toLowerCase()}`);
    return res.ok;
  }catch(e){
    return true;   // offline — can't check, so don't block the guess
  }
}

function flashInvalid(r){
  thud();
  for(let c = 0; c < 5; c++) tile(r, c).classList.add('invalid', 'shake');
  setTimeout(() => {
    for(let c = 0; c < 5; c++){
      const t = tile(r, c);
      t.classList.remove('invalid', 'shake', 'fill');
      t.textContent = '';
    }
    if(row === r) col = 0;      // only reset the typing cursor if we're still on this row
  }, 650);
}

function press(k){
  if(done) return;
  if(k === '⌫' || k === 'BACKSPACE'){
    if(col > 0){ col--; tile(row, col).textContent = ''; tile(row, col).classList.remove('fill'); }
    return;
  }
  if(k === '⏎' || k === 'ENTER'){ submit(); return; }
  if(/^[A-Z]$/.test(k) && col < 5){
    tile(row, col).textContent = k;
    tile(row, col).classList.add('fill');
    col++;
  }
}

async function submit(){
  if(col < 5 || checking || done) return;
  const myRow = row;                      // captured now, in case a restart happens mid-check
  let guess = '';
  for(let c = 0; c < 5; c++) guess += tile(myRow, c).textContent;

  checking = true;
  const valid = await isRealWord(guess);
  checking = false;
  if(row !== myRow || done) return;       // the board moved on while we were checking — abandon

  if(!valid){
    flashInvalid(myRow);
    return;
  }

  const res = score(guess, answer);

  res.forEach((r, c) => setTimeout(() => {      // staggered flip reveal
    tile(myRow, c).classList.add(r);
    const key = kb.querySelector(`[data-k="${guess[c]}"]`);
    const rank = { x: 1, y: 2, g: 3 };          // never downgrade a key's colour
    const cur = key.classList.contains('g') ? 3 : key.classList.contains('y') ? 2 : key.classList.contains('x') ? 1 : 0;
    if(rank[r] > cur){ key.classList.remove('g', 'y', 'x'); key.classList.add(r); }
  }, c * 130));

  setTimeout(() => {
    if(guess === answer){
      done = true;
      fanfare(); awoo();
      sparkEl(board.children[myRow], 22);
      showBanner(['genius ♥', 'amazing!', 'so smart!', 'lovely!', 'phew!', 'just in time ♥'][myRow]);
      again.style.display = 'inline-block';
    } else if(++row === 6){
      done = true;
      thud();
      showBanner(`it was ${answer} ♥`, 3200);
      again.style.display = 'inline-block';
    }
    col = 0;
  }, 5 * 130 + 150);
}

/* real keyboard works too */
addEventListener('keydown', e => press(e.key.toUpperCase()));
again.onclick = newGame;

buildPack();
setupPause(restartSameWord);
newGame();
</script>
</body>
</html>
